<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardingTasks - Pi Network App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 { color: #57419d; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .pi-user { background: #fff9e6; border: 1px solid #ffe0b2; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 20px; color: #e65100; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background: #57419d; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #43327d; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9f9f9; border-bottom: 1px solid #eee; border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
        li.completed { text-decoration: line-through; color: #aaa; background: #e8f5e9; }
    </style>
</head>
<body>

<div class="container">
    <h1>HardingTasks 🚀</h1>
    <div class="subtitle">Pi Network Ecosystem - Vibe Coder Edition</div>
    
    <div id="pi-status" class="pi-user">Connecting to Pi Network...</div>

    <div class="input-group">
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="task-list"></ul>
</div>

<script>
    // Initializing the Pi Network SDK for Testnet (Sandbox)
    try {
        Pi.init({ version: "2.0", sandbox: true });
        document.getElementById('pi-status').innerText = "Successfully connected to Pi Browser (Testnet)";
    } catch (e) {
        document.getElementById('pi-status').innerText = "Local Mode (Open in Pi Browser to run SDK)";
    }

    // Load tasks on startup
    async function loadTasks() {
        const res = await fetch('/api/tasks');
        const tasks = await res.json();
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = task.completed ? 'completed' : '';
            li.innerHTML = `<span>${task.title}</span>`;
            li.onclick = () => toggleTask(task.id);
            list.appendChild(li);
        });
    }

    // Add a new task
    async function addTask() {
        const input = document.getElementById('task-input');
        if (!input.value.trim()) return;

        await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: input.value })
        });
        input.value = '';
        loadTasks();
    }

    // Toggle task completion status
    async function toggleTask(id) {
        await fetch(`/api/tasks/${id}`, { method: 'PUT' });
        loadTasks();
    }

    loadTasks();
</script>
</body>
</html>
